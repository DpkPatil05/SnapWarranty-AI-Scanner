name: snap_warranty
description: "A cross-platform Flutter application architected using strict Clean Architecture and SOLID principles. It leverages the Gemini API to parse unstructured visual data into structured local data, managed via Floor SQLite."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.9

  # --- State Management ---
  # Riverpod 2.x is used to avoid analyzer clashes with code generators
  flutter_riverpod: ^2.6.1

  # --- Local Database (Floor & SQLite) ---
  floor: ^1.5.0
  sqflite: ^2.4.2+1       # Floor requires sqflite under the hood

  # --- AI & External APIs ---
  google_generative_ai: ^0.4.7

  # --- Utilities & Hardware ---
  uuid: ^4.5.3          # For generating unique database IDs
  image_picker: ^1.2.2  # For accessing the camera and gallery
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Linting & Formatting ---
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  # build_runner is kept at 2.4.13 for stability with floor_generator
  build_runner: ^2.4.13
  floor_generator: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - .env

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font.