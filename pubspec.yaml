name: snap_warranty
description: "A cross-platform Flutter application architected using strict Clean Architecture and SOLID principles. It leverages the Gemini API via Direct SDK to parse unstructured visual data into structured local data, managed via Drift SQLite."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1
  flutter: '>=3.44.1'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.9
  mesh_gradient: ^1.3.8 # For Liquid Glass UI effects

  # --- State Management ---
  # Riverpod 3.x for modern mutations and native persistence
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # --- Local Database (Drift & SQLite) ---
  # Drift is the modern, high-performance successor to Floor
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.6
  path: ^1.9.1

  # --- Firebase & AI ---
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  firebase_app_check: ^0.4.5
  google_generative_ai: ^0.4.7 # Using direct SDK to bypass Firebase AI Logic issues

  # --- Utilities & Hardware ---
  uuid: ^4.5.3
  image_picker: ^1.2.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Linting & Formatting ---
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
