name: snap_warranty
description: "A cross-platform Flutter application architected using strict Clean Architecture and SOLID principles. It leverages the Gemini API via Direct SDK to parse unstructured visual data into structured local data, managed via Drift SQLite."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1
  flutter: '>=3.44.1'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.9
  mesh_gradient: ^1.3.8 # For Liquid Glass UI effects

  # --- State Management ---
  # Riverpod 3.x for modern mutations and native persistence
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # --- Local Database (Drift & SQLite) ---
  # Drift is the modern, high-performance successor to Floor
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # --- Firebase & AI ---
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_app_check: ^0.4.5
  firebase_analytics: ^12.4.3
  firebase_remote_config: ^6.5.3
  google_generative_ai: ^0.4.7 # Using direct SDK to bypass Firebase AI Logic issues

  # --- Utilities & Hardware ---
  uuid: ^4.5.3
  image_picker: ^1.2.2
  flutter_dotenv: ^6.0.1
  gal: ^2.3.2
  shared_preferences: ^2.5.5
  in_app_review: ^2.0.12
  package_info_plus: ^9.0.1
  collection: ^1.19.1
  googleapis: ^16.0.0
  crypto: ^3.0.7
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  file_picker: 11.0.2
  syncfusion_flutter_pdfviewer: 28.1.33
  google_sign_in: ^7.2.0
  google_mobile_ads: ^9.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  googleapis_auth: ^2.3.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Linting & Formatting ---
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  riverpod_generator: ^4.0.4

  # --- Asset Generation ---
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  # ADAPTIVE ICON CONFIGURATION (Ensures circular look on Android)
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/icon.png"
  android_12:
    color: "#0F172A"
    icon_background_color: "#0F172A"
    image: "assets/icon.png"
